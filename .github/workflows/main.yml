name: Bygg og deploy Spedisjon

on:
  push:
    paths:
      - 'spedisjon-selve/**'
      - '.github/workflows/main.yml'
      - 'Dockerfile'
      - 'gradle/'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'deploy/dev.yml'
      - 'deploy/prod.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'

jobs:
  build:
    name: Build docker image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21.x'
          cache: 'gradle'
      - name: Test and build
        run: ./gradlew spedisjon-selve:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
      - name: Build docker image
        if: ${{ github.ref_name == 'main' }}
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
          image_suffix: selve
          dockerfile: Dockerfile
          docker_context: spedisjon-selve
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: Deploy to dev
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: deploy/dev.yml
          IMAGE: ${{ needs.build.outputs.image }}

  deployProd:
    name: Deploy to prod
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: deploy/prod.yml
          IMAGE: ${{ needs.build.outputs.image }}
